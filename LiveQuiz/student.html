<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Quiz - Student</title>
    <style>
        body { font-family: Segoe UI, sans-serif; padding: 20px; }
        input, button { font-size: 16px; padding: 6px; margin: 5px 0; }
        #__debug {
            margin-top: 16px;
            font-family: ui-monospace, Consolas, monospace;
            background: #0f172a;
            color: #e2e8f0;
            padding: 8px;
            border-radius: 6px;
            max-height: 180px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<h1>Join Live Quiz</h1>

<label>Room code:</label><br>
<input id="room" autocomplete="off"><br><br>

<label>Your name:</label><br>
<input id="name" autocomplete="off"><br><br>

<button id="join">Join Room</button>

<h2 id="currentQ"></h2>

<input id="answer" placeholder="Your answer..." size="40" disabled>
<button id="sendA" disabled>Send Answer</button>

<h3>Debug</h3>
<div id="__debug"></div>

<!-- Load Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- Initialise Firebase HERE -->
<script>
firebase.initializeApp({
  apiKey: "AIzaSyD8d03q_WJqS4bxrBISFj1igm87v9qXQ_0",
  authDomain: "livequiz-e864f.firebaseapp.com",
  databaseURL: "https://livequiz-e864f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "livequiz-e864f",
  storageBucket: "livequiz-e864f.appspot.com",
  messagingSenderId: "869686522658",
  appId: "1:869686522658:web:98e83a44144dcfdbd4eb7b"
});

// anonymous login
firebase.auth().signInAnonymously().catch(err => console.error("AUTH:", err));
</script>

<!-- Now load helper functions -->
<script type="module">
import { write, update, onValue } from './shared.js';

function debug(msg) {
    console.log(msg);
    document.getElementById("__debug").innerHTML += msg + "<br>";
}

let room = null;
let studentName = null;
let studentId = null;

// JOIN ROOM
document.getElementById("join").onclick = async () => {
    room = document.getElementById("room").value.trim();
    studentName = document.getElementById("name").value.trim();

    if (!room || !studentName) {
        alert("Enter room code and your name");
        return;
    }

    studentId = String(Date.now());
    debug(`Joining room ${room} as ${studentName}`);

    try {
        await update(`rooms/${room}/students/${studentId}`, studentName);
        debug("Student added.");
    } catch (err) {
        debug("WRITE FAILED: " + err.message);
    }

    document.getElementById("answer").disabled = false;
    document.getElementById("sendA").disabled = false;

    onValue(`rooms/${room}/question`, q => {
        debug("Question changed: " + q);
        document.getElementById("currentQ").textContent = q || "";
    });
};

// SEND ANSWER
document.getElementById("sendA").onclick = async () => {
    const a = document.getElementById("answer").value.trim();
    if (!a) return;

    debug(`Sending answer: ${a}`);

    try {
        await update(`rooms/${room}/answers/${studentName}`, a);
    } catch (err) {
        debug("ANSWER FAILED: " + err.message);
    }

    document.getElementById("answer").value = "";
};
</script>

</body>
</html>
