<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room 1 – The Locked Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Shared CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- CodeMirror 5 (works everywhere, no modules needed) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

    <!-- Shared Pyodide loader -->
    <script src="js/pyodide-init.js"></script>

    <!-- Shared Room engine -->
    <script src="js/room.js"></script>

    <!-- Shared Editor (simple, non-module) -->
    <script>
        window.loadEditor = function(startCode) {
            window.editor = CodeMirror(document.getElementById("editor"), {
                value: startCode,
                mode: "python",
                theme: "dracula",
                lineNumbers: true,
                indentUnit: 4,
                smartIndent: true,
                matchBrackets: true,
                autoCloseBrackets: true,
                lineWrapping: true
            });
        };

        window.getEditorCode = function () {
            return window.editor.getValue();
        };
    </script>
</head>

<body>
<div id="container">

    <h1>Room 1: The Locked Terminal</h1>

    <p>Fix <code>count_evens()</code> so it returns the number of even numbers in the list.</p>

    <!-- Starter code stored safely -->
    <script type="text/plain" id="starter-code">
def count_evens(nums):
    total = 0
    for n in nums:
        if n % 2 == 1:  # wrong
            total = total + 1
    return total

print(count_evens([1,2,3,4,5]))
print(count_evens([2,2,2]))
print(count_evens([]))
    </script>

    <!-- Code editor container -->
    <div id="editor"></div>

    <button id="run-btn" class="run-btn">Run Code</button>

    <div id="output"></div>
    <div id="success">Door unlocked! Proceed to the next room.</div>

    <a href="room2.html"><button id="next-btn" class="next-btn">Next Room</button></a>

</div>

<!-- Initialise CodeMirror -->
<script>
window.addEventListener("DOMContentLoaded", () => {
    const starter = document.getElementById("starter-code").textContent.trim();
    window.loadEditor(starter);
});
</script>

<!-- Room-specific config -->
<script src="js/config/room1.js"></script>

</body>
</html>
