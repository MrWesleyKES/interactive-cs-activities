<h1>Room 3: The Chamber of Judgement</h1>

<p>Fix the <code>grade(mark)</code> function so that:</p>
<ul>
    <li>70+ → "A"</li>
    <li>50–69 → "B"</li>
    <li>30–49 → "C"</li>
    <li>&lt;30 → "D"</li>
</ul>

<textarea id="code">
def grade(mark):
    if mark > 70:
        return "A"
    elif mark > 50:
        return "B"
    elif mark > 30:
        return "C"
    else:
        return "F"

print(grade(85))
print(grade(60))
print(grade(45))
print(grade(10))
</textarea>
