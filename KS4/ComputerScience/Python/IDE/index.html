<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Advanced Web Python IDE (Pyodide)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CodeMirror 6 (modern editor) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/monokai.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

<style>
    body {
        margin: 0;
        background: #2c2c2c;
        color: #f0f0f0;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    .left-pane {
        width: 50%;
        display: flex;
        flex-direction: column;
        border-right: 3px solid #444;
    }

    .right-pane {
        width: 50%;
        display: flex;
        flex-direction: column;
    }

    #editor {
        flex: 1;
    }

    #output {
        flex: 1;
        background: #1e1e1e;
        padding: 12px;
        white-space: pre-wrap;
        overflow-y: auto;
        font-family: Consolas, monospace;
        border-top: 3px solid #444;
    }

    .toolbar {
        padding: 8px;
        background: #1a1a1a;
        border-bottom: 3px solid #444;
        display: flex;
        gap: 10px;
    }

    button {
        padding: 8px 14px;
        font-size: 14px;
        background: #333;
        color: #fff;
        border: none;
        cursor: pointer;
        border-radius: 4px;
    }

    button:hover {
        background: #555;
    }

    .splitter {
        width: 5px;
        background: #666;
        cursor: col-resize;
    }
</style>
</head>

<body>

<!-- LEFT: Editor -->
<div class="left-pane">
    <div class="toolbar">
        <button id="runBtn">▶ Run (Ctrl+Enter)</button>
        <button id="clearBtn">🧹 Clear Output</button>
        <button id="saveBtn">💾 Save</button>
        <button id="loadBtn">📂 Load</button>
        <button id="themeBtn">🌓 Theme</button>
    </div>
    <textarea id="editor"></textarea>
</div>

<div class="splitter" id="split"></div>

<!-- RIGHT: Output -->
<div class="right-pane">
    <div id="output">Console output will appear here…</div>
</div>

<script>
/* -------------------------------
   1. CodeMirror Editor Setup
--------------------------------*/
let darkMode = true;

const editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
    mode: "python",
    theme: "monokai",
    lineNumbers: true,
    indentUnit: 4,
    tabSize: 4,
});

editor.setValue(`# Python IDE Loaded!
from pprint import pprint

pprint({"example": [1,2,3], "message": "Pretty printing works!"})
`);

/* -------------------------------
   2. Pyodide Setup
--------------------------------*/
let pyodideReady = false;
let pyodide;

async function loadPy() {
    pyodide = await loadPyodide();
    pyodideReady = true;

    // Load pprint
    await pyodide.runPythonAsync("from pprint import pprint");

    document.getElementById("output").textContent =
        "Pyodide ready. Type Python and run!";
}
loadPy();

/* -------------------------------
   3. Running Python
--------------------------------*/
async function runCode() {
    if (!pyodideReady) return;

    const code = editor.getValue();
    const out = document.getElementById("output");
    out.textContent = "Running...\n";

    try {
        let result = await pyodide.runPythonAsync(`
import sys, io
from pprint import pprint
_buffer = io.StringIO()
sys.stdout = _buffer

${code}

sys.stdout = sys.__stdout__
_buffer.getvalue()
        `);

        out.textContent = result;
    } catch (err) {
        out.textContent = "Error:\n" + err;
    }
}

document.getElementById("runBtn").onclick = runCode;

/* Run on Ctrl+Enter */
document.addEventListener("keydown", (e) => {
    if (e.ctrlKey && e.key === "Enter") {
        runCode();
    }
});

/* -------------------------------
   4. Clear Output
--------------------------------*/
document.getElementById("clearBtn").onclick = () => {
    document.getElementById("output").textContent = "";
};

/* -------------------------------
   5. Save & Load Code (localStorage)
--------------------------------*/
document.getElementById("saveBtn").onclick = () => {
    localStorage.setItem("webIDE_code", editor.getValue());
};

document.getElementById("loadBtn").onclick = () => {
    const saved = localStorage.getItem("webIDE_code");
    if (saved) editor.setValue(saved);
    else alert("No saved code found!");
};

/* -------------------------------
   6. Dark / Light Theme Toggle
--------------------------------*/
document.getElementById("themeBtn").onclick = () => {
    darkMode = !darkMode;
    editor.setOption("theme", darkMode ? "monokai" : "default");
    document.body.style.background = darkMode ? "#2c2c2c" : "#eaeaea";
};

/* -------------------------------
   7. Resizable Split Pane
--------------------------------*/
const split = document.getElementById("split");

split.addEventListener("mousedown", () => {
    document.addEventListener("mousemove", resize, false);
    document.addEventListener("mouseup", () => {
        document.removeEventListener("mousemove", resize, false);
    });
});

function resize(e) {
    const left = document.querySelector(".left-pane");
    const newWidth = e.clientX;
    left.style.width = newWidth + "px";
}
</script>

</body>
</html>
