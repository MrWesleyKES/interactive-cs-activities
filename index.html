<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interactive CS Activities</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f1f5f9;
}
header {
    background: #0f172a;
    color: white;
    padding: 30px 20px;
    text-align: center;
}
h1 { margin: 0 0 10px; }

.tree {
    max-width: 900px;
    margin: 20px auto;
    padding: 10px 20px;
}

.folder {
    cursor: pointer;
    padding: 8px;
    margin: 5px 0;
    background: white;
    border-radius: 6px;
    border: 1px solid #e2e8f0;
}

.children {
    margin-left: 20px;
    display: none;
}

.children.open { display: block; }

.file-link {
    display: block;
    margin: 6px 0;
    padding: 10px;
    background: #f8fafc;
    border-radius: 6px;
    border: 1px solid #e2e8f0;
    text-decoration: none;
    color: #2563eb;
    font-weight: 600;
}
</style>
</head>

<body>

<header>
    <h1>Interactive Computer Science Activities</h1>
    <p>KS3 · KS4 · KS5 — Interactive Learning Tools</p>
</header>

<div class="tree" id="tree">Loading activities…</div>

<script>
// -------------------------
// Load structure.json
// -------------------------
fetch("structure.json")
    .then(r => r.json())
    .then(data => renderTree(data))
    .catch(err => {
        document.getElementById("tree").innerHTML = "Error loading activities.";
        console.error(err);
    });

// -------------------------
// Build collapsible tree
// -------------------------
function renderTree(structure) {
    const root = document.getElementById("tree");
    root.innerHTML = "";
    buildLevel(structure, root);
}

function buildLevel(obj, parentEl) {
    Object.entries(obj).forEach(([key, value]) => {

        // Folder
        if (typeof value === "object" && !value.url) {
            const folder = document.createElement("div");
            folder.className = "folder";
            folder.textContent = key;
            parentEl.appendChild(folder);

            const children = document.createElement("div");
            children.className = "children";
            parentEl.appendChild(children);

            folder.addEventListener("click", () => {
                children.classList.toggle("open");
            });

            buildLevel(value, children);
        }

        // File / activity
        if (typeof value === "object" && value.url) {
            const link = document.createElement("a");
            link.className = "file-link";
            link.href = value.url;
            link.textContent = key;
            parentEl.appendChild(link);
        }
    });
}
</script>

</body>
</html>
