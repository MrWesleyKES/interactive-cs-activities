<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive CS Activities</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f1f5f9;
        color: #0f172a;
    }

    header {
        background: #0f172a;
        color: white;
        padding: 30px 20px;
        text-align: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    h1 {
        margin: 0;
        font-size: 32px;
    }

    #tree {
        max-width: 960px;
        margin: 20px auto;
        padding: 0 20px;
    }

    .folder {
        cursor: pointer;
        background: white;
        padding: 12px 16px;
        margin: 6px 0;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        font-weight: 600;
        transition: 0.2s;
    }
    .folder:hover {
        background: #f0f4ff;
        border-color: #93c5fd;
    }

    .children {
        margin-left: 20px;
        padding-left: 12px;
        border-left: 2px solid #dbeafe;
        display: none;
    }

    .children.open {
        display: block;
        animation: fadein 0.3s ease;
    }

    @keyframes fadein {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .file-link {
        display: block;
        margin: 6px 0;
        padding: 10px 16px;
        background: #f8fafc;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
        text-decoration: none;
        color: #2563eb;
        font-weight: 600;
        transition: 0.2s;
    }
    .file-link:hover {
        background: #eff6ff;
        border-color: #60a5fa;
    }
</style>
</head>

<body>

<header>
    <h1>Interactive Computer Science Activities</h1>
    <p>KS3 · KS4 · KS5 — Dynamic, Interactive HTML Learning Resources</p>
</header>

<div id="tree">Loading activities…</div>

<script>
// Fetch dynamic directory listing from Cloudflare Pages Function
fetch("/list")
    .then(r => r.json())
    .then(data => renderTree(data))
    .catch(err => {
        document.getElementById("tree").innerHTML =
            "<p style='color:red;'>Error loading activities.</p>";
        console.error(err);
    });

// Build collapsible tree from JSON structure
function renderTree(data) {
    const root = document.getElementById("tree");
    root.innerHTML = "";
    buildLevel("", data, root);
}

function buildLevel(base, obj, parent) {
    for (const key in obj) {
        const item = obj[key];

        // If item contains an index.html → it's an activity
        if (item.index) {
            const link = document.createElement("a");
            link.className = "file-link";
            link.href = `/${item.index}`;
            link.textContent = key;
            parent.appendChild(link);
        }

        // Otherwise it's a folder
        if (typeof item === "object" && !item.index) {
            const folder = document.createElement("div");
            folder.className = "folder";
            folder.textContent = key;

            const children = document.createElement("div");
            children.className = "children";

            folder.addEventListener("click", () => {
                children.classList.toggle("open");
            });

            parent.appendChild(folder);
            parent.appendChild(children);

            buildLevel(`${base}${key}/`, item, children);
        }
    }
}
</script>

</body>
</html>
