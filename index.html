<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interactive ICT & Computing Activities</title>

<style>
/* --- THEME --- */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f1f5f9;
    color: #0f172a;
}

header {
    background: #0f172a;
    color: white;
    padding: 30px 20px;
    text-align: center;
}

/* --- TREE NAVIGATION --- */
.tree {
    max-width: 900px;
    margin: 20px auto;
    padding: 10px 20px;
}

.folder {
    margin: 4px 0;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
}

.folder .arrow {
    transition: transform 0.2s ease;
    margin-right: 6px;
    color: #2563eb;
    font-size: 14px;
}

.folder.collapsed .arrow {
    transform: rotate(-90deg);
}

.children {
    margin-left: 20px;
    border-left: 2px solid #e2e8f0;
    padding-left: 12px;
    display: none;
}

.children.open {
    display: block;
}

/* --- FILE CARDS --- */
.file-link {
    display: block;
    background: white;
    border: 1px solid #e2e8f0;
    padding: 10px 14px;
    border-radius: 8px;
    margin: 5px 0;
    font-weight: 600;
    color: #2563eb;
    text-decoration: none;
    transition: 0.2s;
}

.file-link:hover {
    border-color: #2563eb;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}
</style>

</head>
<body>

<header>
    <h1>Interactive Computing Activities</h1>
    <p>KS3 • KS4 • KS5 – Auto‑Generated Learning Explorer</p>
</header>

<div id="tree" class="tree">Loading activities…</div>

<script>
// -------------------------------
// CONFIG – EDIT THESE TWO LINES
// -------------------------------
const USER = "MrWesleyKES";
const REPO = "interactive-computing-activities";
const BRANCH = "main";

// -------------------------------
// FETCH REPO FILE TREE
// -------------------------------
async function fetchTree() {
    const url = `https://api.github.com/repos/${USER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
    const res = await fetch(url);
    return res.json();
}

// -------------------------------
// BUILD HIERARCHY
// -------------------------------
function buildHierarchy(paths) {
    const root = {};

    paths.forEach(path => {
        if (!path.endsWith("index.html")) return;

        const parts = path.split("/");
        let current = root;

        // Walk through each folder level
        parts.forEach((p, i) => {
            if (p === "index.html") return;

            if (!current[p]) {
                current[p] = { _children: {} };
            }
            if (i === parts.length - 2) {
                // This folder directly contains index.html → treat as a file
                current[p]._index = path;
            }
            current = current[p]._children;
        });
    });

    return root;
}

// -------------------------------
// RENDER COLLAPSIBLE TREE
// -------------------------------
function renderTree(node, container) {
    Object.keys(node).forEach(key => {
        const entry = node[key];

        // Create folder element
        const folderEl = document.createElement("div");
        folderEl.className = "folder collapsed";
        folderEl.innerHTML = `<span class="arrow">▼</span> ${key}`;
        container.appendChild(folderEl);

        // Create children container
        const childrenEl = document.createElement("div");
        childrenEl.className = "children";
        container.appendChild(childrenEl);

        // Toggle open/close
        folderEl.addEventListener("click", () => {
            childrenEl.classList.toggle("open");
            folderEl.classList.toggle("collapsed");
        });

        // If folder contains index.html, add link
        if (entry._index) {
            const fileLink = document.createElement("a");
            fileLink.className = "file-link";
            fileLink.href = `/${REPO}/${entry._index}`;
            fileLink.textContent = key + " (Open Activity)";
            childrenEl.appendChild(fileLink);
        }

        // Recurse into child folders
        renderTree(entry._children, childrenEl);
    });
}

// -------------------------------
// INITIALISE
// -------------------------------
async function init() {
    const data = await fetchTree();
    const paths = data.tree.map(x => x.path);

    const hierarchy = buildHierarchy(paths);

    const tree = document.getElementById("tree");
    tree.innerHTML = "";
    renderTree(hierarchy, tree);
}

init();
</script>

</body>
</html>
