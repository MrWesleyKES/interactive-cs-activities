<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label the Computer Parts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #1a2e4a;
      font-size: 1.8rem;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .activity-wrap {
      display: flex;
      gap: 30px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Diagram card */
    .diagram-section {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.10);
      position: relative;
      width: 600px;
      min-height: 500px;
    }

    /* Arrow overlay */
    .arrows-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    /* Drop zones */
    .drop-zone {
      position: absolute;
      background: #dce8f7;
      border: 2px dashed #6a9fd8;
      border-radius: 8px;
      min-width: 120px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: #6a9fd8;
      user-select: none;
      transition: background 0.2s, border-color 0.2s;
      z-index: 10;
    }
    .drop-zone.over      { background: #b8d4f2; border-color: #3577c4; }
    .drop-zone.correct   { background: #d4f0da; border-color: #38a057; color: #217a3c; }
    .drop-zone.incorrect { background: #fde0e0; border-color: #d94040; color: #c0392b; animation: shake .4s; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-6px); }
      75%     { transform: translateX(6px); }
    }

    /* Word bank */
    .word-bank {
      background: #fff;
      border-radius: 16px;
      padding: 20px 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.10);
      width: 200px;
      min-height: 320px;
    }
    .word-bank h2 {
      font-size: 1rem;
      color: #1a2e4a;
      margin-bottom: 14px;
      text-align: center;
      border-bottom: 2px solid #eef2f7;
      padding-bottom: 8px;
    }
    .word-tile {
      background: #3577c4;
      color: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: grab;
      text-align: center;
      user-select: none;
      box-shadow: 0 2px 6px rgba(53,119,196,0.3);
      transition: opacity 0.2s, transform 0.15s;
    }
    .word-tile:active  { cursor: grabbing; transform: scale(1.05); }
    .word-tile.dragging{ opacity: 0.45; }
    .word-tile.used    { display: none; }

    /* Score bar */
    .score-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 22px;
    }
    .score-bar span { font-size: 1rem; color: #1a2e4a; font-weight: 600; }
    #resetBtn {
      background: #3577c4; color: #fff; border: none;
      border-radius: 8px; padding: 8px 22px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    #resetBtn:hover { background: #255da1; }

    .congrats {
      display: none;
      text-align: center;
      margin-top: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #217a3c;
    }
  </style>
</head>
<body>

<p class="subtitle">Drag each word from the word bank to the correct arrow label.</p>

    <!-- Drop zones -->
    <div class="drop-zone" id="dz-hard_drive"
         data-answer="Hard Drive"
         style="top:12px; left:8px;">Drop here</div>

    <div class="drop-zone" id="dz-power_supply"
         data-answer="Power Supply"
         style="top:12px; right:8px;">Drop here</div>

    <div class="drop-zone" id="dz-motherboard"
         data-answer="Motherboard"
         style="top:50%; transform:translateY(-50%); left:8px;">Drop here</div>

         data-answer="CPU"
         style="bottom:85px; left:8px;">Drop here</div>

    <div class="drop-zone" id="dz-ram"
         data-answer="RAM"
         style="top:50%; transform:translateY(-50%); right:8px;">Drop here</div>

         data-answer="Graphics Card"

  <!-- WORD BANK -->

</div>

<div class="score-bar">
  <span>Score: <span id="scoreNum">0</span> / 6</span>
  <button id="resetBtn">Reset</button>
</div>
<div class="congrats" id="congrats">🎉 Great job! You labelled all the parts correctly!</div>

<script>
const PARTS = [
  { id: "dz-hard_drive",   answer: "Hard Drive",    tipX: 0.19, tipY: 0.14 },
  { id: "dz-power_supply", answer: "Power Supply",  tipX: 0.81, tipY: 0.17 },
  { id: "dz-motherboard",  answer: "Motherboard",   tipX: 0.08, tipY: 0.55 },
  { id: "dz-cpu",          answer: "CPU",           tipX: 0.27, tipY: 0.42 },
  { id: "dz-ram",          answer: "RAM",           tipX: 0.53, tipY: 0.45 },
  { id: "dz-gpu",          answer: "Graphics Card", tipX: 0.32, tipY: 0.66 },
];

const LABELS = PARTS.map(p => p.answer);
let score = 0;
let draggedLabel = null;

/* ── Word bank ── */
function buildWordBank() {
  const bank = document.getElementById("wordBank");
  bank.querySelectorAll(".word-tile").forEach(t => t.remove());
  [...LABELS].sort(() => Math.random() - 0.5).forEach(label => {
    const tile = document.createElement("div");
    tile.className = "word-tile";
    tile.textContent = label;
    tile.dataset.label = label;
    tile.draggable = true;
    tile.addEventListener("dragstart", function(e) {
      draggedLabel = label;
      this.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", label);
    });
    tile.addEventListener("dragend", function() { this.classList.remove("dragging"); });
    tile.addEventListener("touchstart", onTouchStart, { passive: false });
    tile.addEventListener("touchmove",  onTouchMove,  { passive: false });
    tile.addEventListener("touchend",   onTouchEnd,   { passive: false });
    bank.appendChild(tile);
  });
}

/* ── Drop zones ── */
document.querySelectorAll(".drop-zone").forEach(dz => {
  dz.addEventListener("dragover", e => { e.preventDefault(); if (!dz.dataset.filled) dz.classList.add("over"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("over"));
  dz.addEventListener("drop", e => {
    e.preventDefault();
    dz.classList.remove("over");
    if (dz.dataset.filled) return;
    handleDrop(dz, e.dataTransfer.getData("text/plain") || draggedLabel);
  });
});

function handleDrop(dz, label) {
  if (dz.dataset.answer === label) {
    dz.textContent = label;
    dz.classList.add("correct");
    dz.dataset.filled = "yes";
    score++;
    document.getElementById("scoreNum").textContent = score;
    document.querySelectorAll(".word-tile").forEach(t => { if (t.dataset.label === label) t.classList.add("used"); });
    if (score === LABELS.length) document.getElementById("congrats").style.display = "block";
  } else {
    dz.classList.add("incorrect");
    setTimeout(() => dz.classList.remove("incorrect"), 500);
  }
}

/* ── Reset ── */
document.getElementById("resetBtn").addEventListener("click", () => {
  score = 0;
  document.getElementById("scoreNum").textContent = 0;
  document.getElementById("congrats").style.display = "none";
  document.querySelectorAll(".drop-zone").forEach(dz => {
    dz.textContent = "Drop here";
    dz.classList.remove("correct", "incorrect");
    dz.dataset.filled = "";
  });
  buildWordBank();
  drawArrows();
});

/* ── Touch support ── */
let touchTile = null, ghost = null;
function onTouchStart(e) {
  touchTile = e.currentTarget;
  draggedLabel = touchTile.dataset.label;
  const t = e.touches[0];
  ghost = touchTile.cloneNode(true);
  ghost.style.cssText = `position:fixed;pointer-events:none;opacity:.75;z-index:9999;width:${touchTile.offsetWidth}px;left:${t.clientX - touchTile.offsetWidth/2}px;top:${t.clientY - touchTile.offsetHeight/2}px;margin:0`;
  document.body.appendChild(ghost);
  touchTile.style.opacity = "0.4";
  e.preventDefault();
}
function onTouchMove(e) {
  const t = e.touches[0];
  ghost.style.left = `${t.clientX - ghost.offsetWidth/2}px`;
  ghost.style.top  = `${t.clientY - ghost.offsetHeight/2}px`;
  e.preventDefault();
}
function onTouchEnd(e) {
  document.body.removeChild(ghost); ghost = null;
  touchTile.style.opacity = "";
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const dz = el ? el.closest(".drop-zone") : null;
  if (dz && !dz.dataset.filled) handleDrop(dz, draggedLabel);
  draggedLabel = null; touchTile = null;
}

/* ── Draw arrows ── */
function drawArrows() {
  const svg = document.getElementById("arrowsSvg");
  const sec = document.getElementById("diagramSection");
  const img = document.getElementById("computerSvg");
  svg.querySelectorAll("line").forEach(l => l.remove());
  if (!img) return;
  const secRect = sec.getBoundingClientRect();
  const imgRect = img.getBoundingClientRect();
  PARTS.forEach(part => {
    const dz = document.getElementById(part.id);
    if (!dz) return;
    const dzRect = dz.getBoundingClientRect();
    const x1 = dzRect.left + dzRect.width  / 2 - secRect.left;
    const y1 = dzRect.top  + dzRect.height / 2 - secRect.top;
    const x2 = imgRect.left - secRect.left + part.tipX * imgRect.width;
    const y2 = imgRect.top  - secRect.top  + part.tipY * imgRect.height;
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x1);
    line.setAttribute("y1", y1);
    line.setAttribute("x2", x2);
    line.setAttribute("y2", y2);
    line.setAttribute("stroke", "#4a7fb5");
    line.setAttribute("stroke-width", "2");
    line.setAttribute("marker-end", "url(#arrowhead)");
    svg.appendChild(line);
  });
}

/* ── Init ── */
buildWordBank();
setTimeout(drawArrows, 100);
window.addEventListener("resize", drawArrows);
</script>
</body>
</html>
