<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I/O Hardware Sort – Picture Edition</title>

    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>I/O & Inside the Computer – Picture Sort!</h1>
    <p>Round <span id="roundNumber">1</span> of 2. Drag each image into the correct category.</p>
</header>

<main>

    <!-- LEFT: draggable images -->
    <section id="items">
        <h2>Devices</h2>
        <div id="draggables"></div>
    </section>

    <!-- RIGHT: dropzones -->
    <section id="zones">
        <div class="zone" data-accept="input">
            <h3>Input Devices</h3>
            <div class="drop"></div>
        </div>

        <div class="zone" data-accept="output">
            <h3>Output Devices</h3>
            <div class="drop"></div>
        </div>

        <div class="zone" data-accept="storage">
            <h3>Storage Devices</h3>
            <div class="drop"></div>
        </div>

        <div class="zone" data-accept="inside">
            <h3>Inside the Computer</h3>
            <div class="drop"></div>
        </div>
    </section>

</main>

<footer>
    <button id="checkBtn">Check Answers</button>
    <button id="nextRoundBtn">Next Round</button>
    <p id="result"></p>
</footer>

<!-- Link to your JS -->
<script src="script.js"></script>

</body>
</html>
