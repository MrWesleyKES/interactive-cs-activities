<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I/O & Inside Computer Starter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>I/O & Inside the Computer – Quick Sort!</h1>
    <p>Drag each item into its correct category. 5‑minute warm‑up.</p>
</header>

<main>

    <section id="items">
        <h2>Devices</h2>
        <div id="draggables">
            <div class="card" draggable="true" data-type="input">Keyboard</div>
            <div class="card" draggable="true" data-type="input">Microphone</div>
            <div class="card" draggable="true" data-type="output">Monitor</div>
            <div class="card" draggable="true" data-type="output">Speakers</div>
            <div class="card" draggable="true" data-type="storage">USB Stick</div>
            <div class="card" draggable="true" data-type="storage">Hard Drive</div>
            <div class="card" draggable="true" data-type="inside">CPU</div>
            <div class="card" draggable="true" data-type="inside">RAM</div>
            <div class="card" draggable="true" data-type="inside">Motherboard</div>
        </div>
    </section>

    <section id="zones">
        <div class="zone" data-accept="input">
            <h3>Input Devices</h3>
            <div class="drop"></div>
        </div>

        <div class="zone" data-accept="output">
            <h3>Output Devices</h3>
            <div class="drop"></div>
        </div>

        <div class="zone" data-accept="storage">
            <h3>Storage Devices</h3>
            <div class="drop"></div>
        </div>

        <div class="zone" data-accept="inside">
            <h3>Inside the Computer</h3>
            <div class="drop"></div>
        </div>
    </section>

</main>

<footer>
    <button id="checkBtn">Check Answers</button>
    <p id="result"></p>
</footer>

<script src="script.js"></script>
</body>
</html>
