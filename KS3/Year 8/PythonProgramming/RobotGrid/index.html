<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Robot Algorithm Challenge – Animated</title>
<style>
  body { font-family: Arial; max-width: 500px; margin: auto; }
  #grid {
    display: grid;
    grid-template-columns: repeat(5, 60px);
    gap: 5px;
    margin: 20px 0;
  }
  .cell {
    width: 60px; height: 60px;
    background: #eee;
    display:flex; justify-content:center; align-items:center;
    font-size:30px;
    transition: background 0.2s;
  }
  .wall { background: #444 !important; }
  .goal { background: #8BC34A !important; }
  .robot { animation: pop 0.2s ease; }
  @keyframes pop {
    0%   { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<h2>Robot Algorithm Challenge (Animated)</h2>

<ul>
  <li>Write one instruction per line</li>
  <li>Allowed commands: <b>up, down, left, right</b></li>
  <li>You can <b>Run</b> only once — press <b>Reset</b> to try again</li>
  <li>Toggle Challenge Mode for random mazes</li>
</ul>

<textarea id="commands" rows="8" style="width:100%;"></textarea>
<br><br>

<button id="runBtn">Run Program</button>
<button id="resetBtn">Reset</button>
<button id="toggleChallengeBtn">Toggle Challenge Mode</button>
<button id="newLevelBtn" disabled>Generate New Level</button>

<div id="grid"></div>

<p id="status" style="font-weight:bold;"></p>

<script>
let robotStart = { x: 0, y: 4 };
let robot = { ...robotStart };
let goal = { x: 4, y: 0 };
let programUsed = false;
let challengeMode = false;
let walls = [];

// -----------------------
// RANDOM LEVEL GENERATORS
// -----------------------
function generateRandomGoal() {
  let gx, gy;
  do {
    gx = Math.floor(Math.random() * 5);
    gy = Math.floor(Math.random() * 5);
  } while (gx === robotStart.x && gy === robotStart.y);
  goal = { x: gx, y: gy };
}

function generateRandomWalls() {
  walls = [];
  let count = Math.floor(Math.random() * 4) + 2;

  while (walls.length < count) {
    let wx = Math.floor(Math.random() * 5);
    let wy = Math.floor(Math.random() * 5);

    if ((wx === robotStart.x && wy === robotStart.y) ||
        (wx === goal.x && wy === goal.y) ||
        walls.some(w => w.x === wx && w.y === wy))
        continue;

    walls.push({ x: wx, y: wy });
  }
}

function isWall(x, y) {
  if (!challengeMode) return false;
  return walls.some(w => w.x === x && w.y === y);
}

// -----------------------
// GRID DRAWING
// -----------------------
function drawGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 5; col++) {
      const cell = document.createElement("div");
      cell.className = "cell";

      if (goal.x === col && goal.y === row)
        cell.classList.add("goal");
      if (isWall(col, row))
        cell.classList.add("wall");
      if (robot.x === col && robot.y === row) {
        cell.textContent = "🤖";
        cell.classList.add("robot");
      }
      grid.appendChild(cell);
    }
  }
}

// -----------------------
// ANIMATED MOVE FUNCTION
// -----------------------
function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function animateMoves(commands) {
  for (let cmd of commands) {
    let newX = robot.x;
    let newY = robot.y;

    if (cmd === "up") newY--;
    if (cmd === "down") newY++;
    if (cmd === "left") newX--;
    if (cmd === "right") newX++;

    if (newX < 0 || newX > 4 || newY < 0 || newY > 4) continue;
    if (isWall(newX, newY)) continue;

    robot.x = newX;
    robot.y = newY;

    drawGrid();
    await sleep(300);  // animation delay
  }
}

// -----------------------
// RUN PROGRAM
// -----------------------
document.getElementById("runBtn").onclick = async function () {
  if (programUsed) return;

  const cmds = document.getElementById("commands").value
    .trim().split("\n")
    .map(c => c.trim().toLowerCase())
    .filter(c => c !== "");

  programUsed = true;
  await animateMoves(cmds);

  if (robot.x === goal.x && robot.y === goal.y) {
    document.getElementById("status").textContent = "✅ Success! You reached the goal!";
  } else {
    document.getElementById("status").textContent = "❌ Program finished — goal not reached.";
  }
};

// -----------------------
// RESET
// -----------------------
document.getElementById("resetBtn").onclick = function () {
  robot = { ...robotStart };
  programUsed = false;
  document.getElementById("status").textContent = "";
  drawGrid();
};

// -----------------------
// CHALLENGE MODE + RANDOM LEVELS
// -----------------------
document.getElementById("toggleChallengeBtn").onclick = function () {
  challengeMode = !challengeMode;
  document.getElementById("newLevelBtn").disabled = !challengeMode;

  if (!challengeMode) {
    walls = [];
    goal = { x: 4, y: 0 };
  }
  drawGrid();
};

document.getElementById("newLevelBtn").onclick = function () {
  generateRandomGoal();
  generateRandomWalls();
  robot = { ...robotStart };
  programUsed = false;
  document.getElementById("status").textContent = "";
  drawGrid();
};

drawGrid();
</script>

</body>
</html>
