<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Python DO NOW – Year 8</title>

<!-- CodeMirror CSS -->
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #1e1e1e;
    color: white;
  }

  header {
    background: #0078d4;
    padding: 14px 24px;
    font-size: 18px;
    font-weight: 600;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: calc(100vh - 52px);
  }

  .left, .right {
    padding: 15px;
  }

  .task {
    background: #2d2d30;
    border-left: 4px solid #4fc3f7;
    padding: 12px;
    margin-bottom: 10px;
    font-size: 14px;
  }

  .locked {
    opacity: 0.4;
  }

  .status {
    margin-top: 6px;
    font-weight: bold;
  }

  .correct { color: #7CFC90; }
  .wrong { color: #ff6b6b; }

  button {
    background: #0e639c;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
  }

  button:hover {
    background: #1380d6;
  }

  .editor {
    height: 55%;
  }

  #output {
    background: black;
    padding: 10px;
    height: 35%;
    overflow-y: auto;
    white-space: pre-wrap;
    font-family: Consolas, monospace;
    font-size: 14px;
    border-radius: 4px;
  }
</style>
</head>

<body>

<header>DO NOW: Python Warm‑Up 🐍 (Start immediately)</header>

<div class="container">

<!-- TASK LIST -->
<div class="left">

  <div class="task" id="task1">
    <strong>Task 1</strong><br>
    Click <em>Run Python</em>.
    <div class="status" id="status1"></div>
  </div>

  <div class="task locked" id="task2">
    <strong>Task 2</strong><br>
    Change the output so it says <em>Hello world</em>.
    <div class="status" id="status2"></div>
  </div>

  <div class="task locked" id="task3">
    <strong>Task 3</strong><br>
    Change the name to <strong>your</strong> name.
    <div class="status" id="status3"></div>
  </div>

  <div class="task locked" id="task4">
    <strong>Task 4</strong><br>
    Ask for the name using <code>input()</code>.
    <div class="status" id="status4"></div>
  </div>

  <div class="task locked" id="task5">
    ✅ <strong>All done</strong><br>
    Sit quietly and wait.
  </div>

  <button onclick="runCode()">▶ Run Python</button>
</div>

<!-- EDITOR + OUTPUT -->
<div class="right">
  <div class="editor">
    <textarea id="code">
user = "Claude"
print("Hello", user)
    </textarea>
  </div>

  <h3>Output</h3>
  <div id="output">Click “Run Python”</div>
</div>

</div>

<!-- CodeMirror JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<script>
const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
  mode: "python",
  theme: "material-darker",
  lineNumbers: true
});

const outputDiv = document.getElementById("output");
let pyodide;

async function loadPython() {
  pyodide = await loadPyodide();
}
loadPython();


async function runCode() {
  outputDiv.textContent = "";

  try {
    pyodide.setStdout({ batched: t => outputDiv.textContent += t });
    pyodide.setStderr({ batched: t => outputDiv.textContent += t });

    // ✅ Fake input() using browser prompt
    await pyodide.runPythonAsync(`
import builtins
builtins.input = lambda prompt="": __import__("js").prompt(prompt)
`);

    await pyodide.runPythonAsync(editor.getValue());
    checkTasks();
  } catch (err) {
    outputDiv.textContent += err;
  }
}


function unlock(n) {
  document.getElementById("task" + n).classList.remove("locked");
}

function mark(n, ok) {
  const s = document.getElementById("status" + n);
  if (ok) {
    s.textContent = "✅ Complete";
    s.className = "status correct";
    unlock(n + 1);
  } else {
    s.textContent = "❌ Try again";
    s.className = "status wrong";
  }
}

function checkTasks() {
  const code = editor.getValue();
  const out = outputDiv.textContent.toLowerCase();

  mark(1, out.trim().length > 0);
  mark(2, out.includes("hello world"));
  mark(3, !out.includes("claude"));
  mark(4, code.includes("input"));
}
</script>

</body>
</html>
