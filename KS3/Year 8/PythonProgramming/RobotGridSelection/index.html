<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Robot Selection – Until Green</title>

<style>
  body { font-family: Arial; max-width: 600px; margin: auto; }
  #grid {
    display: grid;
    grid-template-columns: repeat(7, 60px);
    gap: 5px;
    margin-top: 15px;
  }
  .cell {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    background: #444;
  }
  .path { background: #eee; }
  .red { background: #ef9a9a; }
  .blue { background: #90caf9; }
  .green { background: #8bc34a; }
</style>
</head>
<body>

<h2>Selection Challenge: Escape the Maze</h2>

<p>
The robot moves <b>forward forever</b>.<br>
On <b>every square</b>, it checks the colour and follows your rules.<br>
The robot stops only when it reaches <span style="color:green"><b>GREEN</b></span>.
</p>

<h3>Your rules</h3>

🔴 IF on RED → 
<select id="redRule">
  <option value="left">Turn left</option>
  <option value="right">Turn right</option>
</select>

<br><br>

🔵 IF on BLUE → 
<select id="blueRule">
  <option value="left">Turn left</option>
  <option value="right">Turn right</option>
</select>

<br><br>

<button onclick="run()">Run</button>
<button onclick="reset()">Reset</button>

<div id="grid"></div>
<p id="status"></p>

<script>
let robot = { x: 0, y: 3, dir: 1 }; // start left, facing right
const start = { ...robot };

// Maze layout: # = wall, P = path
// Colours only appear at forks
const maze = [
  ["#", "#", "#", "#", "#", "#", "#"],
  ["#", "red", "P", "P", "P", "red", "#"],
  ["#", "P", "#", "#", "#", "P", "#"],
  ["P", "blue", "P", "P", "P", "blue", "green"],
  ["#", "#", "#", "#", "#", "#", "#"],
];

const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
function robotIcon() {
  return ["↑", "→", "↓", "←"][robot.dir];
}
  
function draw() {
  const g = document.getElementById("grid");
  g.innerHTML = "";
  for (let y=0; y<maze.length; y++) {
    for (let x=0; x<maze[0].length; x++) {
      const cell = document.createElement("div");
      cell.className = "cell";

      const tile = maze[y][x];
      if (tile === "P" || tile === "") cell.classList.add("path");
      if (tile === "red") cell.classList.add("red");
      if (tile === "blue") cell.classList.add("blue");
      if (tile === "green") cell.classList.add("green");

      
if (robot.x === x && robot.y === y) {
  cell.innerHTML = "🤖<div style='font-size:14px'>" + ["↑","→","↓","←"][robot.dir] + "</div>";
}


      g.appendChild(cell);
    }
  }
}

function tileAhead() {
  const nx = robot.x + dirs[robot.dir][0];
  const ny = robot.y + dirs[robot.dir][1];
  return maze[ny]?.[nx];
}

function applyRule(colour, rule) {
  if (rule === "left") robot.dir = (robot.dir + 3) % 4;
  if (rule === "right") robot.dir = (robot.dir + 1) % 4;
}

async function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

async function run() {
  const redRule = document.getElementById("redRule").value;
  const blueRule = document.getElementById("blueRule").value;

  let steps = 0;

  while (steps < 50) { // safety limit
    // Move forward if path exists
    const nx = robot.x + dirs[robot.dir][0];
    const ny = robot.y + dirs[robot.dir][1];
    if (maze[ny]?.[nx] === "#" || maze[ny] === undefined) break;

    robot.x = nx;
    robot.y = ny;

    const tile = maze[robot.y][robot.x];
    if (tile === "red") applyRule("red", redRule);
    if (tile === "blue") applyRule("blue", blueRule);

    draw();
    await sleep(400);

    if (tile === "green") {
      document.getElementById("status").textContent = "✅ Escaped the maze!";
      return;
    }

    steps++;
  }

  document.getElementById("status").textContent =
    "❌ Robot is stuck. Rethink your rules.";
}

function reset() {
  robot = { ...start };
  document.getElementById("status").textContent = "";
  draw();
}

draw();
</script>

</body>
</html>
